<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pool Project Tracker — Dunkin & Burton</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
  .tab-active{border-bottom:3px solid #2563eb;color:#2563eb;font-weight:600}
  .editable:hover{background:#fef9c3;cursor:text}
  .editable:focus{background:#fef9c3;outline:2px solid #f59e0b;border-radius:2px}
  @media print{.no-print{display:none}}
</style>
</head>
<body class="bg-gray-50">
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef}=React;

// ============================================================
// PERSISTENCE — localStorage (separate key from homeowner)
// ============================================================
const STORAGE_KEY='pool_dashboard_contractor_v1';
function loadState(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY))||{}}catch{return{}}}
function saveState(s){localStorage.setItem(STORAGE_KEY,JSON.stringify(s))}

function usePersist(key,init){
  const[val,setVal]=useState(()=>{const s=loadState();return s[key]!==undefined?s[key]:init});
  useEffect(()=>{const s=loadState();s[key]=val;saveState(s)},[key,val]);
  return[val,setVal];
}

// ============================================================
// TABS (contractor sees: Timeline, Financial, Tasks, Contract, Orders, Comms)
// ============================================================
const TABS=[
  {id:'timeline',label:'1. Timeline',icon:'📅'},
  {id:'financial',label:'2. Financial',icon:'💰'},
  {id:'tasks',label:'3. Tasks',icon:'✅'},
  {id:'contract',label:'4. Contract',icon:'📋'},
  {id:'orders',label:'5. Orders',icon:'📦'},
  {id:'comms',label:'6. Comms Log',icon:'📞'},
];

// ============================================================
// EDITABLE CELL
// ============================================================
function EditCell({value,onChange,className='',placeholder='click to edit'}){
  const[editing,setEditing]=useState(false);
  const[v,setV]=useState(value);
  const ref=useRef();
  useEffect(()=>{setV(value)},[value]);
  if(editing) return <input ref={ref} autoFocus className={`text-sm px-1 py-0.5 border rounded w-full ${className}`}
    value={v} onChange={e=>setV(e.target.value)}
    onBlur={()=>{setEditing(false);if(v!==value)onChange(v)}}
    onKeyDown={e=>{if(e.key==='Enter'){setEditing(false);if(v!==value)onChange(v)}if(e.key==='Escape'){setV(value);setEditing(false)}}} />;
  return <span onClick={()=>setEditing(true)} className={`editable px-1 py-0.5 rounded cursor-text inline-block min-w-[40px] ${className} ${!value?'text-gray-300 italic':''}`}>{value||placeholder}</span>;
}

// ============================================================
// STATUS DROPDOWN
// ============================================================
const STATUSES=['Not Started','In Progress','Complete','Blocked','TBD'];
const STATUS_COLORS={'Not Started':'bg-gray-100 text-gray-600','In Progress':'bg-blue-100 text-blue-700','Complete':'bg-green-100 text-green-700','Blocked':'bg-red-100 text-red-700','TBD':'bg-amber-100 text-amber-700'};

function StatusSelect({value,onChange}){
  return <select value={value} onChange={e=>onChange(e.target.value)}
    className={`text-xs font-medium px-2 py-1 rounded border-0 cursor-pointer ${STATUS_COLORS[value]||''}`}>
    {STATUSES.map(s=><option key={s} value={s}>{s}</option>)}
  </select>;
}

const CONTRACT_STATUSES=['Pending','Accepted','Rejected','Discussing'];
const CONTRACT_STATUS_COLORS={'Pending':'bg-gray-100 text-gray-600','Accepted':'bg-green-100 text-green-700','Rejected':'bg-red-100 text-red-700','Discussing':'bg-amber-100 text-amber-700'};

function ContractStatusSelect({value,onChange}){
  return <select value={value} onChange={e=>onChange(e.target.value)}
    className={`text-xs font-medium px-2 py-1 rounded border-0 cursor-pointer ${CONTRACT_STATUS_COLORS[value]||''}`}>
    {CONTRACT_STATUSES.map(s=><option key={s} value={s}>{s}</option>)}
  </select>;
}

function Badge({children,color}){
  const c={red:'bg-red-100 text-red-800',amber:'bg-amber-100 text-amber-800',green:'bg-green-100 text-green-800',blue:'bg-blue-100 text-blue-800',gray:'bg-gray-100 text-gray-600',purple:'bg-purple-100 text-purple-800'};
  return <span className={`text-xs font-medium px-2 py-0.5 rounded-full ${c[color]||c.gray}`}>{children}</span>;
}

function Card({title,children,className=''}){
  return <div className={`bg-white rounded-lg border shadow-sm ${className}`}>
    {title&&<div className="px-4 py-3 border-b font-semibold text-gray-800 text-sm">{title}</div>}
    <div className="p-4">{children}</div>
  </div>;
}

// ============================================================
// MAIN APP — CONTRACTOR VIEW
// ============================================================
function App(){

          <div className="font-semibold text-lg">Project Total: $99,456.50</div>

// TAB 3: TASKS (Burton tasks only, no add/delete)
// ============================================================
function TasksTab(){
  const defaultTasks=[
    {id:20,task:'Draw up revised plans (Mar 12 layout)',owner:'Whitlee',status:'Not Started',due:'Mar 19',pri:'High',notes:'Spray paint layout from visit'},
    {id:21,task:'Provide updated quote with all concrete extras',owner:'Whitlee',status:'Complete',due:'Mar 19',pri:'High',notes:'Contract received: $99,456.50'},
    {id:22,task:'Connect Lance with Eduardo (landscaper)',owner:'Whitlee',status:'Not Started',due:'ASAP',pri:'High',notes:'French drain, fence, landscaping'},
    {id:23,task:'Provide hot tub options/brands/pricing',owner:'Whitlee',status:'Not Started',due:'Mar 26',pri:'High',notes:'Confirmed YES -- need models to pick from'},
    {id:24,task:'Review and accept contract addendum',owner:'Burton',status:'Not Started',due:'After addendum sent',pri:'Critical',notes:'16 contract items to review'},
    {id:25,task:'Pull permits with City of Bentonville',owner:'Burton',status:'Not Started',due:'After signing',pri:'Critical',notes:''},
    {id:26,task:'Order Claremont shell (by Apr 24 for crystal)',owner:'Burton',status:'Not Started',due:'After signing',pri:'Critical',notes:''},
    {id:27,task:'Provide Certificate of Insurance',owner:'Burton',status:'Not Started',due:'Before work',pri:'High',notes:'GL + Workers Comp'},
    {id:28,task:'Provide AR contractor license #',owner:'Burton',status:'Not Started',due:'Before signing',pri:'High',notes:''},
  ];

  const[tasks,setTasks]=usePersist('contractor_tasks_v1',defaultTasks);
  const[showDone,setShowDone]=useState(true);

  const updateTask=(id,field,val)=>setTasks(prev=>prev.map(t=>t.id===id?{...t,[field]:val}:t));

  const filtered=tasks.filter(t=>{
    if(!showDone&&t.status==='Complete') return false;
    return true;
  });

  const totalDone=tasks.filter(t=>t.status==='Complete').length;

  return <div className="space-y-4">
    <div className="flex justify-between items-center">
      <div className="text-sm font-semibold text-gray-700">Burton Tasks -- {totalDone}/{tasks.length} done</div>
      <label className="text-xs flex items-center gap-1"><input type="checkbox" checked={showDone} onChange={e=>setShowDone(e.target.checked)}/>Show completed</label>
    </div>

    <div className="bg-white rounded-lg border shadow-sm overflow-x-auto">
      <table className="w-full text-sm">
        <thead><tr className="bg-gray-50 text-left text-xs">
          <th className="p-2 w-8">Done</th><th className="p-2">Task</th><th className="p-2">Owner</th><th className="p-2">Due</th><th className="p-2">Priority</th><th className="p-2">Status</th><th className="p-2">Notes</th>
        </tr></thead>
        <tbody>
          {filtered.map(t=>(
            <tr key={t.id} className={`border-t hover:bg-gray-50 ${t.status==='Complete'?'opacity-50':''} ${t.pri==='Critical'&&t.status!=='Complete'?'bg-red-50':''}`}>
              <td className="p-2 text-center">
                <input type="checkbox" checked={t.status==='Complete'} onChange={()=>updateTask(t.id,'status',t.status==='Complete'?'Not Started':'Complete')} className="w-4 h-4"/>
              </td>
              <td className={`p-2 font-medium ${t.status==='Complete'?'line-through text-gray-400':''}`}>{t.task}</td>
              <td className="p-2">{t.owner}</td>
              <td className="p-2">{t.due}</td>
              <td className="p-2">
                <span className={`text-xs px-1 py-0.5 rounded ${t.pri==='Critical'?'bg-red-100 text-red-800':t.pri==='High'?'bg-amber-100 text-amber-800':t.pri==='Medium'?'bg-blue-100 text-blue-800':'bg-gray-100 text-gray-600'}`}>{t.pri}</span>
              </td>
              <td className="p-2"><StatusSelect value={t.status} onChange={v=>updateTask(t.id,'status',v)}/></td>
              <td className="p-2 text-xs text-gray-500">{t.notes}</td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>
    <p className="text-xs text-gray-400">Status updates save automatically to your browser.</p>
  </div>;
}

  const[itemStatuses,setItemStatuses]=usePersist('contractor_contractStatuses',defaultStatuses);

  const updateStatus=(key,val)=>setItemStatuses(p=>({...p,[key]:val}));

  const items=[
    {num:1,key:'item1',title:'Fix arbitration clause (Indian law -> Arkansas law)'},
    {num:2,key:'item2',title:'Cap overage costs at $5,000 + require written approval'},
    {num:3,key:'item3',title:'Add 10-day notice before lien filing'},
    {num:4,key:'item4',title:'Add completion deadline (60 days from start, $50/day for delays)'},
    {num:5,key:'item5',title:'Define "Substantial Completion"'},
    {num:6,key:'item6',title:'Builder-coordinated drainage, grading & landscaping plan'},
    {num:7,key:'item7',title:'Increase final holdback to 10% ($9,946)'},
    {num:8,key:'item8',title:'Deposits refundable if builder fails to start within 45 days'},
    {num:9,key:'item9',title:'Final payment tied to ALL contracted items (including cover)'},
    {num:10,key:'item10',title:'Exempt builder-caused change orders from $100 fee'},
    {num:11,key:'item11',title:'Add free crystal upgrade to contract'},
    {num:12,key:'item12',title:'Reference PHTA/APSP workmanship standards'},
    {num:13,key:'item13',title:'Structural concrete crack warranty (>1/4" in first 12 months)'},
    {num:14,key:'item14',title:'Document Burton\'s offered fence restoration contact (Eduardo)'},
    {num:15,key:'item15',title:'Builder documents pre-construction condition, uses protective measures'},
    {num:16,key:'item16',title:'Warranty period begins on date of Substantial Completion'},
  ];

  const resolvedCount=items.filter(i=>{
    const s=itemStatuses[i.key]||'Pending';
    return s==='Accepted'||s==='Rejected';
  }).length;

  return <div className="space-y-6">
    <Card title={`Contract Addendum Items -- ${resolvedCount}/16 resolved`}>
      <div className="w-full bg-gray-200 rounded-full h-3 mb-2">
        <div className="bg-blue-600 h-3 rounded-full transition-all" style={{width:`${resolvedCount/16*100}%`}}></div>
      </div>
      <div className="flex gap-4 text-xs text-gray-500 mb-4">
        <span>Accepted: {items.filter(i=>(itemStatuses[i.key]||'Pending')==='Accepted').length}</span>
        <span>Rejected: {items.filter(i=>(itemStatuses[i.key]||'Pending')==='Rejected').length}</span>
        <span>Discussing: {items.filter(i=>(itemStatuses[i.key]||'Pending')==='Discussing').length}</span>
        <span>Pending: {items.filter(i=>(itemStatuses[i.key]||'Pending')==='Pending').length}</span>
      </div>
      <p className="text-sm text-gray-600">These items correspond to the formal addendum document provided separately. Please review and update status as we discuss each item.</p>
    </Card>

    <Card title="All 16 Contract Items">
      <div className="space-y-3">
        {items.map(item=>{
          const status=itemStatuses[item.key]||'Pending';
          const borderColor=status==='Accepted'?'border-green-400':status==='Rejected'?'border-red-400':status==='Discussing'?'border-amber-400':'border-gray-300';
          const bgColor=status==='Accepted'?'bg-green-50':status==='Rejected'?'bg-red-50':status==='Discussing'?'bg-amber-50':'bg-white';
          return <div key={item.key} className={`p-4 rounded-lg border-l-4 ${borderColor} ${bgColor} ${status==='Accepted'||status==='Rejected'?'opacity-70':''}`}>
            <div className="flex items-center justify-between gap-3">
              <div className="flex items-center gap-3">
                <span className="text-sm font-bold text-gray-400 w-6">#{item.num}</span>
                <span className={`font-semibold text-sm ${status==='Accepted'||status==='Rejected'?'line-through':''}`}>{item.title}</span>
              </div>
              <ContractStatusSelect value={status} onChange={v=>updateStatus(item.key,v)}/>
            </div>
            {status!=='Accepted'&&status!=='Rejected'&&<div className="ml-9 mt-1 text-xs text-gray-500">
              Review proposed addendum language for this item.
            </div>}
          </div>;
        })}
      </div>
    </Card>
  </div>;
}
