<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pool Project Dashboard — Dunkin Family</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
  .tab-active{border-bottom:3px solid #2563eb;color:#2563eb;font-weight:600}
  .editable:hover{background:#fef9c3;cursor:text}
  .editable:focus{background:#fef9c3;outline:2px solid #f59e0b;border-radius:2px}
  .completed-row td,.completed-row{opacity:.5;text-decoration:line-through}
  .completed-row .no-strike{text-decoration:none;opacity:1}
  @media print{.no-print{display:none}}

<body class="bg-gray-50">
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useCallback,useRef}=React;

// ============================================================
// PERSISTENCE — localStorage read/write
// ============================================================
const STORAGE_KEY='pool_dashboard_v3';
function loadState(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY))||{}}catch{return{}}}
function saveState(s){localStorage.setItem(STORAGE_KEY,JSON.stringify(s))}

function usePersist(key,init){
  const[val,setVal]=useState(()=>{const s=loadState();return s[key]!==undefined?s[key]:init});
  useEffect(()=>{const s=loadState();s[key]=val;saveState(s)},[key,val]);
  return[val,setVal];
}

// ============================================================
// TABS
// ============================================================
const TABS=[
  {id:'timeline',label:'1. Timeline',icon:'📅'},
  {id:'financial',label:'2. Financial',icon:'💰'},
  {id:'tasks',label:'3. Tasks',icon:'✅'},
  {id:'orders',label:'4. Orders',icon:'📦'},
  {id:'comms',label:'5. Comms Log',icon:'📞'},
];

// ============================================================
// EDITABLE CELL
// ============================================================
function EditCell({value,onChange,className='',placeholder='click to edit'}){
  const[editing,setEditing]=useState(false);
  const[v,setV]=useState(value);
  const ref=useRef();
  useEffect(()=>{setV(value)},[value]);
  if(editing) return <input ref={ref} autoFocus className={`text-sm px-1 py-0.5 border rounded w-full ${className}`}
    value={v} onChange={e=>setV(e.target.value)}
    onBlur={()=>{setEditing(false);if(v!==value)onChange(v)}}
    onKeyDown={e=>{if(e.key==='Enter'){setEditing(false);if(v!==value)onChange(v)}if(e.key==='Escape'){setV(value);setEditing(false)}}} />;
  return <span onClick={()=>setEditing(true)} className={`editable px-1 py-0.5 rounded cursor-text inline-block min-w-[40px] ${className} ${!value?'text-gray-300 italic':''}`}>{value||placeholder}</span>;
}

// ============================================================
// STATUS DROPDOWN
// ============================================================
const STATUSES=['Not Started','In Progress','Complete','Blocked','TBD'];
const STATUS_COLORS={'Not Started':'bg-gray-100 text-gray-600','In Progress':'bg-blue-100 text-blue-700','Complete':'bg-green-100 text-green-700','Blocked':'bg-red-100 text-red-700','TBD':'bg-amber-100 text-amber-700'};

function StatusSelect({value,onChange}){
  return <select value={value} onChange={e=>onChange(e.target.value)}
    className={`text-xs font-medium px-2 py-1 rounded border-0 cursor-pointer ${STATUS_COLORS[value]||''}`}>
    {STATUSES.map(s=><option key={s} value={s}>{s}</option>)}
  </select>;
}


function Badge({children,color}){
  const c={red:'bg-red-100 text-red-800',amber:'bg-amber-100 text-amber-800',green:'bg-green-100 text-green-800',blue:'bg-blue-100 text-blue-800',gray:'bg-gray-100 text-gray-600',purple:'bg-purple-100 text-purple-800'};
  return <span className={`text-xs font-medium px-2 py-0.5 rounded-full ${c[color]||c.gray}`}>{children}</span>;
}

function Card({title,children,className=''}){
  return <div className={`bg-white rounded-lg border shadow-sm ${className}`}>
    {title&&<div className="px-4 py-3 border-b font-semibold text-gray-800 text-sm">{title}</div>}
    <div className="p-4">{children}</div>
  </div>;
}

function Section({title,children}){
  const[open,setOpen]=useState(true);
  return <div className="mb-4">
    <button onClick={()=>setOpen(!open)} className="w-full text-left flex items-center justify-between py-2 font-semibold text-gray-800 text-sm border-b">
      <span>{title}</span><span className="text-gray-400">{open?'▼':'▶'}</span>
    </button>
    {open&&<div className="mt-2">{children}</div>}
  </div>;
}

// ============================================================
// MAIN APP
// ============================================================

      <div className="max-w-7xl mx-auto">
        <h2 className="text-sm font-bold text-red-800 mb-2">WHAT'S NEXT -- {completedUrgent}/{urgents.length} done</h2>

    <div className="max-w-7xl mx-auto px-6 py-6">

function FamilyCalendar(){
  const[events,setEvents]=usePersist('familyEvents',[
    {date:'Late May',event:'School ends / Summer break begins',conflict:'May overlap with construction'},
    {date:'Jun-Aug',event:'Pool season! Heavy use window',conflict:'Target: pool ready mid-June'},
  ]);
  const addEvent=()=>setEvents(p=>[...p,{date:'',event:'',conflict:''}]);
  const removeEvent=(i)=>setEvents(p=>p.filter((_,j)=>j!==i));
  const updateEvent=(i,field,val)=>setEvents(p=>p.map((e,j)=>j===i?{...e,[field]:val}:e));

  return <Card title="Family Calendar Overlay">
    <table className="w-full text-sm">
      <thead><tr className="bg-gray-50"><th className="text-left p-2">Date</th><th className="text-left p-2">Event</th><th className="text-left p-2">Notes / Conflict</th><th className="p-2 w-8"></th></tr></thead>
      <tbody>
        {events.map((e,i)=><tr key={i} className="border-t">
          <td className="p-2"><EditCell value={e.date} onChange={v=>updateEvent(i,'date',v)} placeholder="Date"/></td>
          <td className="p-2"><EditCell value={e.event} onChange={v=>updateEvent(i,'event',v)} placeholder="Event name"/></td>
          <td className="p-2"><EditCell value={e.conflict} onChange={v=>updateEvent(i,'conflict',v)} placeholder="Notes"/></td>
          <td className="p-2"><button onClick={()=>removeEvent(i)} className="text-red-400 hover:text-red-600 text-xs">x</button></td>
        </tr>)}
      </tbody>
    </table>
    <button onClick={addEvent} className="mt-2 text-xs text-blue-600 hover:underline">+ Add event</button>
  </Card>;
}

          {filtered.map(t=>(

              <td className={`p-2 font-medium ${t.status==='Complete'?'line-through text-gray-400':''}`}>

              <td className="p-2"><EditCell value={t.due} onChange={v=>updateTask(t.id,'due',v)}/></td>
              <td className="p-2">
                <select value={t.pri} onChange={e=>updateTask(t.id,'pri',e.target.value)}
                  className={`text-xs px-1 py-0.5 rounded cursor-pointer ${t.pri==='Critical'?'bg-red-100 text-red-800':t.pri==='High'?'bg-amber-100 text-amber-800':t.pri==='Medium'?'bg-blue-100 text-blue-800':'bg-gray-100 text-gray-600'}`}>
                  {['Critical','High','Medium','Low'].map(p=><option key={p}>{p}</option>)}</select>
              </td>
              <td className="p-2"><StatusSelect value={t.status} onChange={v=>updateTask(t.id,'status',v)}/></td>

            </tr>
          ))}
        </tbody>
      </table>
    </div>
    <p className="text-xs text-gray-400">Click any cell to edit. Changes save automatically to your browser.</p>
  </div>;
}
